[package]
name = "dataplane-interface-manager"
version = "0.1.0"
edition = "2024"

[features]
default = ["tracing/release_max_level_debug"]


[dependencies]
id = { workspace = true, features = ["serde"] }
net = { workspace = true, features = ["serde"] }

bitflags = "2.9.0"
derive_builder = { workspace = true, default-features = false, features = ["default"] }
futures = { workspace = true, features = ["default"] }
left-right = { workspace = true, default-features = false, features = [] }
multi_index_map = { workspace = true, features = ["serde"] }
nix = { workspace = true, features = ["sched", "fs"] }
rtnetlink = { workspace = true, features = ["default", "tokio"] }
serde = { workspace = true, features = ["rc", "derive"] }
serde_yml = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "sync"] }
tracing = { workspace = true, features = ["attributes"] }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }




