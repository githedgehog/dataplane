[package]
name = "dataplane-acl"
edition.workspace = true
license.workspace = true
publish.workspace = true
version.workspace = true

[features]
default = []
bolero = ["dep:bolero", "net/bolero"]

[dependencies]
arc-swap = { workspace = true }
arrayvec = { workspace = true }
bolero = { workspace = true, features = ["std"], optional = true }
dpdk = { workspace = true }
net = { workspace = true }
rekon = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync"] }

[dev-dependencies]
bolero = { workspace = true, features = ["std"] }
dataplane-acl = { path = ".", features = ["bolero"] }
net = { workspace = true, features = ["builder", "bolero", "test_buffer"] }
static_assertions = { workspace = true }
tokio = { workspace = true, features = ["sync", "rt", "macros", "time"] }
