[env]
DATAPLANE_SYSROOT = { value = "sysroot", relative = true, force = false }
C_INCLUDE_PATH = { value = "sysroot/include", relative = true, force = false }
LIBRARY_PATH = { value = "sysroot/lib", relative = true, force = false }
GW_CRD_PATH = { value = "devroot/src/fabric/config/crd/bases", relative = true, force = false }
PKG_CONFIG_PATH = { value = "sysroot/lib/pkgconfig", relative = true, force = false }
LIBCLANG_PATH = { value = "devroot/lib", relative = true, force = false }
CLANG_PATH = { value = "devroot/bin/clang", relative = true, force = false }
LLVM_COV = { value = "devroot/bin/llvm-cov", relative = true, force = false }
LLVM_PROFDATA = { value = "devroot/bin/llvm-profdata", relative = true, force = false }
CARGO_LLVM_COV_TARGET_DIR = { value = "target/llvm-cov/build", relative = true, force = false }
CARGO_LLVM_COV_BUILD_DIR = { value = "target/llvm-cov/target", relative = true, force = false }

[build]
rustflags = ["--cfg=tokio_unstable"]

[target.wasm32-wasip1]
# Trailing `--` separates wasmtime's CLI from the module + module args
# that cargo appends, so e.g. `--nocapture` from libtest reaches the
# wasm module instead of being parsed as a wasmtime option.
runner = "wasmtime run --dir . --"

# Explicit-triple form (NOT cfg-patterns) is intentional: `cargo miri`
# injects `--config target.cfg(all()).runner=cargo-miri-wrapped` on every
# invocation, and cargo refuses to disambiguate between two cfg-pattern
# matches.  Exact triple entries side-step the conflict because cargo
# treats them as more specific than `cfg(all())` and selects them
# directly.  See scripts/test-runner.sh for how the script then detects
# the miri context and re-delegates to .cargo-miri-wrapped so a miri
# run with a matching host arch still goes through the miri interpreter
# instead of running natively under the qemu wrapper.
[target.x86_64-unknown-linux-gnu]
runner = "scripts/test-runner.sh x86_64"

[target.x86_64-unknown-linux-musl]
runner = "scripts/test-runner.sh x86_64"

[target.aarch64-unknown-linux-gnu]
runner = "scripts/test-runner.sh aarch64"

[target.aarch64-unknown-linux-musl]
runner = "scripts/test-runner.sh aarch64"

[alias]
nt = "nextest"
