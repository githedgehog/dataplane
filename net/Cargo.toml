[package]
name = "net"
version = "0.0.1"
edition = "2021"
publish = false

[features]
default = ["serde"]
serde = ["dep:serde"]
bolero = ["dep:bolero"]

[dependencies]
arrayvec = { workspace = true }
bolero = { workspace = true, optional = true }
# Ideally we could do without the std feature in etherparse.
# Unfortunately, the error types it offers require std.
# Now that the Error trait is in core as well as std we may be able to
# expose those types in etherparse without std.
# This is a problem for future us.
etherparse = { workspace = true, default-features = false, features = ["std"] }
serde = { workspace = true, optional = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
bolero = { workspace = true }
etherparse = { workspace = true, default-features = false, features = ["std"] }

