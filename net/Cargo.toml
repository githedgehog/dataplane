[package]
name = "net"
version = "0.0.1"
edition = "2021"
publish = false

[[bench]]
name = "parse"
harness = false

[features]
default = ["serde"]
serde = ["dep:serde"]
bolero = ["dep:bolero"]

[dependencies]
arrayvec = { workspace = true }
bolero = { workspace = true, optional = true }
etherparse = { workspace = true, default-features = false, features = ["std"] } # ideally we do without std here
serde = { workspace = true, optional = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
bolero = { workspace = true }
etherparse = { workspace = true, default-features = false, features = ["std"] }

