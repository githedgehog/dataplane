[package]
name = "dataplane-net"
edition.workspace = true
license.workspace = true
publish.workspace = true
version.workspace = true

[features]
default = []
serde = ["id/serde"]
netdevsim = []

bolero = ["dep:bolero", "id/bolero"]
test_buffer = []
builder = []

[target.'cfg(unix)'.dependencies]
atomic-instant-full = { workspace = true }

[dependencies]
arrayvec = { workspace = true, features = ["serde", "std"] }
bitflags = { workspace = true }
bolero = { workspace = true, features = ["std"], optional = true }
bytecheck = { workspace = true }
concurrency = { workspace = true }
derive_builder = { workspace = true, features = ["alloc"] }
downcast-rs = { workspace = true, features = ["sync"] }
etherparse = { workspace = true, features = ["std"] }
id = { workspace = true }
multi_index_map = { workspace = true, default-features = false, features = ["serde"] }
rapidhash = { workspace = true }
rkyv = { workspace = true, features = ["alloc", "bytecheck"]}
serde = { workspace = true, features = ["derive", "std"] }
static_assertions = { workspace = true }
strum = { workspace = true }
strum_macros = { workspace = true }
thiserror = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
ahash = { workspace = true, features = ["no-rng"] }
bolero = { workspace = true, features = ["std"] }
