[workspace]

members = [
	"dataplane",
	"dpdk",
	"dpdk-sys",
	"errno",
	"net",
]
resolver = "2"

[workspace.dependencies]

bindgen = { version = "0.71.1" }
doxygen-rs = { version = "0.4.0" }
etherparse = { version = "0.17.0", default-features = false, features = [] }
proptest = { version = "1.6.0", default-features = true }
serde = { version = "1.0.213", default-features = false, features = ["derive", "alloc", "rc"] }
thiserror = { version = "2.0.11" }
tracing = { version = "0.1.40", default-features = false, features = ["attributes"] }

[profile.dev]
panic = "unwind"

[profile.release]
panic = "unwind"
