[package]
name = "dataplane-stats"
version = "0.1.0"
edition = "2024"
publish = false
license = "Apache-2.0"

[dependencies]
# internal
kanal = { workspace = true, features = ["async"] }
net = { workspace = true, features = [] }
pipeline = { workspace = true }
vpcmap = { workspace = true }

# external
arrayvec = { workspace = true }
derive_builder = { workspace = true }
hashbrown = { workspace = true, features = ["inline-more", "alloc", "default-hasher"] }
left-right = { workspace = true }
metrics = { workspace = true }
multi_index_map = { workspace = true }
rand = { workspace = true, features = ["std", "default"] }
serde = { workspace = true, features = ["derive"] }
small-map = { workspace = true, features = ["ahash"] }
thiserror = { workspace = true }
tracing = { workspace = true }

