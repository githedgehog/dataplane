# Composite action that installs nix, configures Cachix, and exports the
# dataplane dev-shell environment into the job so subsequent steps can invoke
# tools like `just`, `oras`, and `actionlint` directly.

name: "Set up nix shell"
description: "Install nix, configure Cachix, and enter the dataplane dev-shell"

inputs:
  cachix_signing_key:
    description: "Cachix signing key"
    required: true
  cachix_auth_token:
    description: "Cachix auth token"
    required: true

runs:
  using: "composite"
  steps:
    - name: "Install nix"
      uses: "cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3" # v31.10.6
      with:
        github_access_token: "${{ github.token }}"
        nix_path: "nixpkgs=channel:nixpkgs-unstable"

    - uses: "cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71" # v17
      with:
        name: "hedgehog"
        # prettier-ignore
        signingKey: '${{ inputs.cachix_signing_key }}'
        # prettier-ignore
        authToken: '${{ inputs.cachix_auth_token }}'

    - name: "use nix shell"
      uses: "rrbutani/use-nix-shell-action@59a52b2b9bbfe3cc0e7deb8f9059abe37a439edf" # v1.1.0
      with:
        file: "shell.nix"
