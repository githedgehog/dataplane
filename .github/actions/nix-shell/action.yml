# Composite action that installs nix, configures Cachix, and exports the
# dataplane dev-shell environment into the job so subsequent steps can invoke
# tools like `just`, `oras`, and `actionlint` directly.

name: "Set up nix shell"
description: "Install nix, configure Cachix, and enter the dataplane dev-shell"

inputs:
  cachix_signing_key:
    description: "Cachix signing key"
    required: true
  cachix_auth_token:
    description: "Cachix auth token"
    required: true

runs:
  using: "composite"
  steps:
    - name: "Install nix"
      uses: "cachix/install-nix-action@v31"
      with:
        github_access_token: "${{ github.token }}"
        nix_path: "nixpkgs=channel:nixpkgs-unstable"

    - uses: "cachix/cachix-action@v17"
      with:
        name: "hedgehog"
        # prettier-ignore
        signingKey: '${{ inputs.cachix_signing_key }}'
        # prettier-ignore
        authToken: '${{ inputs.cachix_auth_token }}'
        # Exclude source-volatile paths from cachix push.  These rebuild
        # on every source revision, so caching them is net-negative
        # (push cost without ever hitting on substitute).
        #
        # Two arms:
        #   1. `-dataplane-cargo-` covers every cargo derivation and
        #      the dataplane.tar assembly -- they're all tagged with
        #      this `name = ...` prefix in default.nix's `invoke`
        #      block and the dataplane.tar derivation.
        #   2. `-(dataplane|debugger|frr)\.tar\.gz` covers the
        #      cargo-bearing OCI images.  dockerTools.buildLayeredImage
        #      strips the registry/org from the OCI name when computing
        #      its store-path basename, so the container store paths
        #      land as e.g. `<hash>-dataplane.tar.gz`.  The other two
        #      containers (frr-host, debug-tools) don't bundle cargo
        #      outputs and are still pushed normally.
        pushFilter: '(-dataplane-cargo-|-(dataplane|debugger|frr)\.tar\.gz)'

    - name: "use nix shell"
      uses: "rrbutani/use-nix-shell-action@v1"
      with:
        file: "shell.nix"
