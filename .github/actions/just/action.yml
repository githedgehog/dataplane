# Composite action that runs a just recipe.
#
# Expects the nix-setup action to have already run in this job; nix-setup
# exports the nix-shell environment (including `just` on PATH) into the job
# via rrbutani/use-nix-shell-action, so no `nix-shell --run` wrapper is needed.
#
# Just variable assignments (profile=debug, sanitize=, etc.) are read from the
# JUST_VARS environment variable.  Set it once at the job level and every step
# that uses this action will pick it up:
#
#   env:
#     JUST_VARS: >-
#       profile=${{ matrix.build.profile }}
#       sanitize=${{ matrix.build.sanitize }}
#       ...
#
#   steps:
#     - uses: ./.github/actions/just
#       with:
#         recipe: test
#
# To override or extend for a single step, set JUST_VARS at the step level.

name: "Run just recipe"
description: "Run a just recipe using JUST_VARS for variable assignments"

inputs:
  recipe:
    description: "The just recipe to run (e.g. test, lint, fmt)"
    required: true
  recipe_args:
    description: "Positional arguments to pass after the recipe name"
    default: ""

runs:
  using: "composite"
  steps:
    - name: "just ${{ inputs.recipe }} ${{ inputs.recipe_args }}"
      shell: "bash"
      env:
        RECIPE: "${{ inputs.recipe }}"
        RECIPE_ARGS: "${{ inputs.recipe_args }}"
      run: |
        set -euo pipefail
        just ${JUST_VARS} "${RECIPE}" ${RECIPE_ARGS}
