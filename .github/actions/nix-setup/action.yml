# Composite action that sets up the nix dev-shell environment plus logins to
# ghcr.io and the image cache registry.  Use in jobs that need to push or
# pull container images; use the lighter `nix-shell` composite if you only
# need the dev-shell tooling.

name: "Setup nix environment"
description: "Enter the nix dev-shell and login to ghcr.io + the image cache registry"

inputs:
  cachix_signing_key:
    description: "Cachix signing key"
    required: true
  cachix_auth_token:
    description: "Cachix auth token"
    required: true

runs:
  using: "composite"
  steps:
    - name: "login to ghcr.io"
      uses: "docker/login-action@v4"
      with:
        registry: "ghcr.io"
        username: "${{ github.actor }}"
        password: "${{ github.token }}"

    - uses: "./.github/actions/nix-shell"
      with:
        cachix_signing_key: "${{ inputs.cachix_signing_key }}"
        cachix_auth_token: "${{ inputs.cachix_auth_token }}"

    - name: "login to image cache"
      shell: "bash"
      run: |
        set -euo pipefail
        docker login -u "$REGISTRY_USERNAME" --password-stdin "$REGISTRY_URL" <<<"${REGISTRY_PASSWORD}"
        oras login -u "$REGISTRY_USERNAME" --password-stdin "$REGISTRY_URL" <<<"${REGISTRY_PASSWORD}"
