# Composite action that sets up a nix-shell environment with cachix and registry logins.
#
# Use this once per job, then run recipes via the just composite action.

name: "Setup nix environment"
description: "Install nix, configure cachix, warm the nix-shell cache, and login to registries"

inputs:
  cachix_signing_key:
    description: "Cachix signing key"
    required: true
  cachix_auth_token:
    description: "Cachix auth token"
    required: true

runs:
  using: "composite"
  steps:
    - name: "login to ghcr.io"
      uses: "docker/login-action@v4"
      with:
        registry: "ghcr.io"
        username: "${{ github.actor }}"
        password: "${{ github.token }}"

    - name: "Install nix"
      uses: "cachix/install-nix-action@v31"
      with:
        github_access_token: "${{ github.token }}"
        nix_path: "nixpkgs=channel:nixpkgs-unstable"

    - uses: "cachix/cachix-action@v17"
      with:
        name: "hedgehog"
        # prettier-ignore
        signingKey: '${{ inputs.cachix_signing_key }}'
        # prettier-ignore
        authToken: '${{ inputs.cachix_auth_token }}'

    # Avoid attributing nix-shell fetch time to whatever step runs first.
    - name: "setup nix shell"
      shell: "bash"
      run: |
        nix-shell --run "set -euo pipefail; echo nix shell env cached"

    - name: "login to image cache"
      shell: "bash"
      run: |
        docker login -u "$REGISTRY_USERNAME" --password-stdin "$REGISTRY_URL" <<<"${REGISTRY_PASSWORD}"
        nix-shell --run "set -euo pipefail; oras login -u \"$REGISTRY_USERNAME\" --password-stdin \"$REGISTRY_URL\" <<<\"${REGISTRY_PASSWORD}\""
