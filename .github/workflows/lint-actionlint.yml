# Make sure we don't have obvious vulns / anti patterns in our code or
# actions config.

name: "lint-actionlint.yml"

on:
    pull_request: {}
    merge_group:
        types: ["checks_requested"]

concurrency:
    group: "${{ github.workflow }}:${{ github.event.pull_request.number || github.event.after || github.event.merge_group && github.run_id }}"
    cancel-in-progress: true

permissions:
    contents: "read"

jobs:
    actionlint:
        name: "Run actionlint"
        runs-on: "lab"
        # Skip this job in merge group checks; but we need the workflow to run,
        # given that the status check is required for merging.
        if: "${{ github.event.pull_request }}"
        env:
            USER: "runner"
        steps:
            - name: "Checkout"
              uses: "actions/checkout@v6"
              with:
                  fetch-depth: "1"
                  persist-credentials: "false"

            - uses: "./.github/actions/nix-shell"
              with:
                  cachix_signing_key: "${{ secrets.CACHIX_SIGNING_KEY }}"
                  cachix_auth_token: "${{ secrets.CACHIX_AUTH_TOKEN }}"

            - name: "Run actionlint"
              shell: "bash"
              run: |
                  set -euo pipefail
                  actionlint
