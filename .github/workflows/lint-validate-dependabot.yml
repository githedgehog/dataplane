name: "lint-validate-dependabot.yml"

on:
  pull_request:
    paths:
      - ".github/dependabot.yml"
      - ".github/workflows/dependabot-validate.yml"

permissions:
  contents: "read"

jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v7"
      - uses: "marocchino/validate-dependabot@v3"
        id: "validate"
