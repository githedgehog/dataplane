version: 2

updates:
  - package-ecosystem: "github-actions"
    target-branch: "main"
    commit-message:
      prefix: "bump(github-actions):"
    directories:
      - "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
    labels:
      - "automated"
      - "dependencies"
  - package-ecosystem: "cargo"
    target-branch: "main"
    commit-message:
      prefix: "bump(cargo):"
    directories:
      - "/"
    schedule:
      interval: "weekly"
    labels:
      - "automated"
      - "dependencies"
    versioning-strategy: "lockfile-only"
    ignore:
      - dependency-name: "gateway_config"
    groups:
      dependencies:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
